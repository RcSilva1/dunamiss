<!DOCTYPE html>
<html>
<head>
    <title>Gradiente México - Solução Definitiva</title>
    <style>
        .titulo_mexico {
            font-size: 50px;
            font-weight: bold;
            background: linear-gradient(90deg, red, blue);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            display: inline-block;
            /* CRUCIAL: evita problemas de contexto de empilhamento */
            position: static;
            z-index: auto;
        }
    </style>
</head>
<body>
    <h3 class="titulo_mexico">México</h3>
</body>
</html>
